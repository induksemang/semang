name: Keep Supabase Alive
on:
  schedule:
    # Run at 16:00 UTC on Thursday (4) and Saturday (6) = midnight WITA on Friday & Sunday
    - cron: '0 16 * * 4,6'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/notifications?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
